<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Mueller | Home</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/mattmuellerlogo.png">
  <link rel="shortcut icon" type="image/png" href="/assets/mattmuellerlogo.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* =========================
       PRE-SAVE BANNER
    ========================== */
    .presave-banner {
      width: 100%;
      background: #5D72A2;
      margin-top: 80px; /* pushes below sticky header */
      transition: all 0.25s ease;
      position: relative;
      z-index: 10;
    }

    .presave-banner a {
      display: block;
      width: 100%;
      padding: 16px 20px;

      text-align: center;
      text-decoration: none;

      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 1.5px;

      color: #ffffff;
      background: #5D72A2;

      border-top: 2px solid #C0C0C0;
      border-bottom: 2px solid #C0C0C0;

      transition: all 0.25s ease;
    }

    .presave-banner a:hover {
      background: #C0C0C0;
      color: #5D72A2;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .presave-banner {
        margin-top: 70px;
      }

      .presave-banner a {
        font-size: 0.95rem;
        padding: 14px 12px;
        line-height: 1.4;
      }
    }
  </style>
</head>

<body>

  <!-- Shared Header -->
  <div id="site-header"></div>

  <!-- Pre-Save Banner -->
  <div class="presave-banner">
    <a href="https://open.spotify.com/track/1ozWSq1rGoNF4bL4B5zU16?si=1834852ce76e4bf9" target="_blank">
      LISTEN TO “IN OVER MY HEAD”
    </a>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h2>Listen Now</h2>

      <div class="music-links">

        <!-- Spotify -->
        <a
          href="https://open.spotify.com/artist/79YZOjggALPQngm5TV6dii"
          target="_blank"
          class="spotify-link"
          aria-label="Listen on Spotify"
        >
          <i class="fab fa-spotify"></i>
        </a>

        <!-- Apple Music -->
        <a
          href="https://music.apple.com/artist/matt-mueller/1788445729"
          target="_blank"
          class="apple-link"
          aria-label="Listen on Apple Music"
        >
          <i class="fab fa-apple"></i>
        </a>

        <!-- YouTube Music -->
        <a
          href="https://youtube.com/@mattmuellermusic?si=ACuVI2WHDuyewpUD"
          target="_blank"
          class="youtube-link"
          aria-label="Listen on YouTube Music"
        >
          <i class="fab fa-youtube"></i>
        </a>

        <!-- Amazon Music -->
        <a
          href="https://music.amazon.com/artists/B07Q57PZ4Q/matt-mueller"
          target="_blank"
          class="amazon-link"
          aria-label="Listen on Amazon Music"
        >
          <i class="fab fa-amazon"></i>
        </a>

      </div>
    </div>
  </section>

  <!-- Shared Footer -->
  <div id="site-footer"></div>

  <!-- Main JS -->
  <script src="js/main.js"></script>

</body>
</html>
