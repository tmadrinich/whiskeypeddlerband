<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Mueller | Media</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/mattmuellerlogo.png">
  <link rel="shortcut icon" type="image/png" href="/assets/mattmuellerlogo.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- Site Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Shared Header -->
  <div id="site-header"></div>

  <!-- Hero Section -->
  <section class="hero hero-media">
    <div class="hero-content">
      <h2>Media</h2>
      <p>Latest Music, Photos & More</p>
    </div>
  </section>

  <!-- Latest Releases -->
<section class="page-content latest-releases">
  <h1>Latest Releases</h1>
  <div class="embed-wrapper">
    <iframe
      src="https://open.spotify.com/embed/artist/79YZOjggALPQngm5TV6dii"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>
</section>


  <!-- Photos Carousel -->
  <section class="page-content photos-carousel">
    <h1>Photos</h1>
    <div class="carousel">
      <button class="carousel-btn prev" aria-label="Previous">
        <i class="fas fa-chevron-left"></i>
      </button>

      <div class="carousel-track">
        <img src="/assets/gallery1.jpg" alt="Recording session 1">
        <img src="/assets/gallery2.jpg" alt="Recording session 2">
        <img src="/assets/gallery3.jpg" alt="Recording session 3">
        <img src="/assets/gallery4.jpg" alt="Recording session 4">
        <img src="/assets/gallery5.jpg" alt="Recording session 5">
      </div>

      <button class="carousel-btn next" aria-label="Next">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </section>

  <!-- Shared Footer -->
  <div id="site-footer"></div>

  <!-- Site JS -->
  <script src="/js/main.js"></script>

  <!-- Carousel JS -->
  <script>
    const track = document.querySelector('.carousel-track');
    const slides = Array.from(track.children);
    const nextBtn = document.querySelector('.carousel-btn.next');
    const prevBtn = document.querySelector('.carousel-btn.prev');

    let index = 0;

    function updateCarousel() {
      track.style.transform = `translateX(-${index * 100}%)`;
    }

    nextBtn.addEventListener('click', () => {
      index = (index + 1) % slides.length;
      updateCarousel();
    });

    prevBtn.addEventListener('click', () => {
      index = (index - 1 + slides.length) % slides.length;
      updateCarousel();
    });

    // Mobile swipe support
    let startX = 0;

    track.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });

    track.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - startX;
      if (diff > 50) prevBtn.click();
      if (diff < -50) nextBtn.click();
    });
  </script>

</body>
</html>
