<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matt Mueller | Shows</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/mattmuellerlogo.png">
  <link rel="shortcut icon" type="image/png" href="/assets/mattmuellerlogo.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato&family=Oswald&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    crossorigin="anonymous"
  />

  <!-- Site Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Shared Header -->
  <div id="site-header"></div>

  <!-- Shows / Calendar Section -->
  <section class="page-content">
    <h1>Upcoming Shows</h1>
    <div id="events-container">
      <p>Loading upcoming shows...</p>
    </div>
  </section>

  <!-- Google Calendar Integration -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const calendarId = 'ae68da38e08ac4ce31d9d9e455888be40c2f232b12f3a961f180208b79c1a038@group.calendar.google.com';
      const apiKey = 'AIzaSyBT4GHGzgD9RfWmRQKJqROkhLNj9jJEBeU';
      const maxEvents = 20;

      const timeMin = new Date().toISOString();

      const url =
        'https://www.googleapis.com/calendar/v3/calendars/' +
        encodeURIComponent(calendarId) +
        '/events?key=' + apiKey +
        '&timeMin=' + timeMin +
        '&singleEvents=true&orderBy=startTime&maxResults=' + maxEvents;

      fetch(url)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('events-container');

          if (!data.items || data.items.length === 0) {
            container.innerHTML = '<p>No upcoming shows.</p>';
            return;
          }

          // Safety filter: remove past events
          const upcomingEvents = data.items.filter(event => {
            const start = new Date(event.start.dateTime || event.start.date);
            return start >= new Date();
          });

          if (upcomingEvents.length === 0) {
            container.innerHTML = '<p>No upcoming shows.</p>';
            return;
          }

          // Render events
          container.innerHTML = upcomingEvents.map(event => {
            const start = new Date(event.start.dateTime || event.start.date);
            const end = new Date(event.end.dateTime || event.end.date);

            const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: true };

            const dateStr = start.toLocaleDateString('en-US', dateOptions);
            const startTime = start.toLocaleTimeString('en-US', timeOptions);
            const endTime = end.toLocaleTimeString('en-US', timeOptions);

            const title = event.summary || 'Show';
            const location = event.location || 'Location TBD';

            return `
              <div class="event-card">
                <div class="event-title">${title}</div>
                <div class="event-location">${location}</div>
                <div class="event-time">${dateStr}, ${startTime} - ${endTime}</div>
              </div>
            `;
          }).join('');
        })
        .catch(err => {
          console.error('Fetch error:', err);
          document.getElementById('events-container').innerHTML = '<p>Failed to load events.</p>';
        });
    });
  </script>

  <!-- Shared Footer -->
  <div id="site-footer"></div>

  <!-- Site JS -->
  <script src="/js/main.js"></script>

</body>
</html>
